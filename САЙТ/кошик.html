<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>B&K — Кошик</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
header { background: #000; color: #fff; padding: 15px 50px; text-align: center; }
header a { color: #fff; text-decoration: none; font-weight: bold; }
.cart-container { max-width: 800px; margin: 50px auto; padding: 20px; border: 1px solid #eee; }
h2 { border-bottom: 2px solid #000; padding-bottom: 10px; text-transform: uppercase; }
.cart-item { display: flex; align-items: center; gap: 20px; padding: 20px 0; border-bottom: 1px solid #eee; }
.cart-item img { width: 100px; }
.item-details { flex: 2; }
.item-price { flex: 1; text-align: right; font-weight: bold; font-size: 18px; }
.cart-summary { margin-top: 30px; text-align: right; }
.total-price { font-size: 24px; font-weight: bold; color: #e10600; }
.btn-checkout { background: #e10600; color: #fff; padding: 15px 40px; display: inline-block; text-decoration: none; font-weight: bold; margin-top: 20px; border: none; cursor: pointer; }
.btn-continue { background: #000; color: #fff; padding: 15px 40px; display: inline-block; text-decoration: none; font-weight: bold; margin-top: 20px; margin-right: 10px; }       
.btn-checkout:hover, .btn-continue:hover { opacity: 0.8; }
</style>
</head>
<body>
<div class="cart-container">
<h2>Ваш кошик</h2>
<div class="cart-item">
<img src="куртка ж.jpg" alt="Товар">
<div class="item-details">
<h3> куртка ж </h3>
<p>Розмір: M</p>
<p>Колір: Чорний</p>
</div>
<div class="item-price">3 990,00 ₴</div>
</div>
<div class="cart-summary">
<p>Сума замовлення: <span class="total-price">3 990,00 ₴</span></p>
<a href="Головна.html" class="btn-continue">НА ГОЛОВНУ</a>
<a href="форма замовлення.html" class="btn-checkout">ОФОРМИТИ ЗАМОВЛЕННЯ</a>
</div>
</body>
</html>
