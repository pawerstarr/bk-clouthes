<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>B&K — Оформлення замовлення</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f9f9f9; }
header { background: #000; color: #fff; padding: 15px 50px; text-align: center; }
header a { color: #fff; text-decoration: none; font-weight: bold; text-transform: uppercase; }
.checkout-container { max-width: 600px; margin: 40px auto; background: #fff; padding: 30px; border: 1px solid #ddd; }
h2 { border-bottom: 2px solid #000; padding-bottom: 10px; text-transform: uppercase; margin-top: 0; }
.form-group { margin-bottom: 20px; }
label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
input[type="text"], input[type="tel"], input[type="email"], textarea, select {
width: 100%; padding: 12px; border: 1px solid #ccc; box-sizing: border-box; font-family: Arial;}
.radio-group { display: flex; flex-direction: column; gap: 10px; margin-top: 5px; }
.radio-option { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 10px; border: 1px solid #eee; }
.radio-option:hover { background: #f5f5f5; }
.btn-submit { 
background: #e10600; color: #fff; width: 100%; padding: 18px; border: none; 
font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-top: 20px;}
.btn-submit:hover { background: #c10500; }
.btn-back { 
display: block; text-align: center; color: #555; text-decoration: none; 
margin-top: 15px; font-size: 13px; font-weight: bold; }
</style>
</head>
<body>
<header>
<div class="logo"><a href="Головна.html">B&K Sport</a></div>
</header>
<div class="checkout-container">
<h2 align=center >Оформлення замовлення</h2> 
<form>
<div class="form-group">
<label>ПІБ </label>
<input type="text" placeholder="Прізвище, Ім'я, По батькові" required>
</div>
<div class="form-group">
<label>Номер телефону </label>
<input type="tel" placeholder="+380" required>
</div>
<div class="form-group">
<label>Спосіб доставки </label>
<div class="radio-group">
<label class="radio-option">
<input type="radio" name="delivery" value="post" checked> Відділення Нової Пошти
</label>
<label class="radio-option">
<input type="radio" name="delivery" value="postomat"> Поштомат
</label>
<label class="radio-option">
<input type="radio" name="delivery" value="pickup"> Самовивіз
</label>
</div>
</div>
<div class="form-group">
<label>Адреса доставки / Номер відділення</label>
<input type="text" placeholder="Місто та номер відділення">
</div>
<div class="form-group">
<label>Спосіб оплати </label>
<select required>
<option value="card">Картою на сайті</option>
<option value="cash">Готівка (при самовивозі)</option>
<option value="cod">Накладений платіж (при отриманні)</option>
</select>
</div>
<div class="form-group">
<label>Побажання до замовлення</label>
<textarea rows="3" placeholder="Наприклад: коментар до розміру або зручний час замовлення"></textarea>
</div>
<button type="submit" class="btn-submit">Підтвердити замовлення</button>
<a href="кошик.html" class="btn-back">ПОВЕРНУТИСЯ ДО КОШИКА</a>
</form>
</div>
</body>
</html>
